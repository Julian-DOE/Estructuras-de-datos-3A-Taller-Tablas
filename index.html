<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<title>Data-Table Engine</title>
<style>
  body{font-family:Arial;margin:20px}
  table{border-collapse:collapse;width:100%}
  th,td{border:1px solid #ccc;padding:6px}
  th{background:#eee;cursor:pointer}
  tfoot td{font-weight:bold;background:#f4f4f4}
</style>
</head>
<body>

<h2>Data-Table Engine</h2>

<!-- Cargar JSON desde archivo local -->
<input type="file" id="fileInput" />

<!-- Cargar set de datos de prueba -->
<button id="loadSample">Usar datos de prueba</button>

<br><br>

<!-- Input de búsqueda en tiempo real -->
<input type="text" id="searchInput" placeholder="Buscar..." />

<!-- Tabla donde se mostrará la información -->
<table id="table">
  <thead></thead>
  <tbody></tbody>
  <tfoot></tfoot>
</table>

<!-- Se carga el archivo principal de JS -->
<script type="module" src="js/main.js"></script>
</body>
</html>
